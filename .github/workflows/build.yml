name: Build APK

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - '.claude/**'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin

      - name: Install dependencies
        run: npm install --legacy-peer-deps --ignore-scripts --no-package-lock

      - name: Prebuild Android project
        run: npx expo prebuild --platform android --clean

      - name: Build APK (arm64-v8a only)
        run: cd android && ./gradlew assembleRelease -PreactNativeArchitectures=arm64-v8a

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: primbon-jawa-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
